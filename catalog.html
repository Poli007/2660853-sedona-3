        <ul class="checkbox-list">
          <li class="checkbox-item">
            Инфраструктура
          </li>
          <p class="checkbox-option-text">
            <input type="checkbox" name="option" id="option-pool" checked>
          <label for"option-pool">

          </p>
          <p class="checkbox-option-text">
            <input type="checkbox" name="option" id="option-parking" checked>

          <p class="checkbox-option-text">
            <input type="checkbox" name="internet" id="option-internet">

            </label>
          </p>
          <li class="radio-item">
            Тип Жилья:
          </li>
          <p class="radio-option-text">
            <input type="radio" name="option" value="option-one" id="option-hotel" checked>
            <label for="option-hotel">
              Гостиница
            </label>
          </p>
          <p class="radio-option-text">
            <input type="radio" name="option" value="option-two" id="option-motel">
            <label for="option-motel">
              Мотель
            </label>
          </p>
          <p class="radio-option-text">
            <input type="radio" name="option" value="option-free" id="option-apartments">
            <label for="option-apartments">
              Апартаменты
            </label>
          </p>
          <li class="price">
            Стоимость, ₽:
            <form class="price-form" action="https://echo.htmlacademy.ru/" method="get">
              <fiedset>
                <legend>Стоимость, ₽:</legend>
                <label>
                  от

                </label>
                <label>
                  до
                  <input type="text" value="9000">
                </label>
              </fiedset>

            </form>

          </li>
        </ul>
